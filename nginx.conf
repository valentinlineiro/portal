upstream portal-backend {
  server portal-backend:5000;
}

upstream exam-corrector-backend {
  server exam-corrector-backend:8000;
}

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Internal subrequest used by auth_request — never exposed externally
  location = /_auth {
    internal;
    proxy_pass              http://portal-backend/auth/me;
    proxy_pass_request_body off;
    proxy_set_header        Content-Length "";
    proxy_set_header        Host $http_host;
    proxy_set_header        Cookie $http_cookie;
    proxy_set_header        X-Original-URI $request_uri;
  }

  location /api/ {
    proxy_pass         http://portal-backend;
    proxy_set_header   Host $host;
  }

  location /auth/ {
    proxy_pass         http://portal-backend;
    proxy_set_header   Host $http_host;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /apps/exam-corrector/ {
    auth_request       /_auth;
    error_page 401 =   @unauthorized;

    proxy_pass         http://exam-corrector-backend;
    proxy_set_header   Host $host;
  }

  location /exam-corrector/batch/ {
    auth_request       /_auth;
    error_page 401 =   @unauthorized;

    proxy_pass         http://exam-corrector-backend;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 60s;
    client_max_body_size 200m;
  }

  location /exam-corrector/ {
    auth_request       /_auth;
    error_page 401 =   @unauthorized;

    proxy_pass         http://exam-corrector-backend;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 310s;
    client_max_body_size 20m;
  }

  location @unauthorized {
    default_type application/json;
    return 401 '{"error":"unauthorized"}';
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
